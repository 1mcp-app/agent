name: Docker

on:
  workflow_call:
    inputs:
      release_ref:
        description: Branch to build Docker images from.
        required: true
        type: string
      release_sha:
        description: Exact release commit SHA to build from.
        required: true
        type: string
      version:
        description: Release version being built.
        required: true
        type: string
      version_tag:
        description: Release tag name.
        required: true
        type: string
      docker_raw_tag:
        description: Raw Docker tag for the extended image.
        required: true
        type: string
      is_prerelease:
        description: Whether the release is a prerelease.
        required: true
        type: boolean
concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    name: docker (${{ matrix.target }}, ${{ matrix.platform_name }})
    runs-on: ${{ matrix.runner }}
    environment: release
    permissions:
      contents: read
      packages: write
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: basic
            platform: linux/amd64
            platform_name: amd64
            runner: ubuntu-latest
            suffix: -lite
            raw_tag: lite
          - target: extended
            platform: linux/amd64
            platform_name: amd64
            runner: ubuntu-latest
            suffix: ''
            raw_tag: latest
          - target: basic
            platform: linux/arm64
            platform_name: arm64
            runner: ubuntu-24.04-arm
            suffix: -lite
            raw_tag: lite
          - target: extended
            platform: linux/arm64
            platform_name: arm64
            runner: ubuntu-24.04-arm
            suffix: ''
            raw_tag: latest

    steps:
      - name: Validate release ref
        env:
          RELEASE_REF: ${{ inputs.release_ref }}
          RELEASE_SHA: ${{ inputs.release_sha }}
          VERSION: ${{ inputs.version }}
          VERSION_TAG: ${{ inputs.version_tag }}
          DOCKER_RAW_TAG: ${{ inputs.docker_raw_tag }}
          IS_PRERELEASE: ${{ inputs.is_prerelease }}
        run: |
          set -euo pipefail
          if [[ "$RELEASE_REF" != "main" && ! "$RELEASE_REF" =~ ^release-[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid release ref: $RELEASE_REF"
            exit 1
          fi
          if [[ ! "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Invalid release SHA: $RELEASE_SHA"
            exit 1
          fi
          VERSION_TAG_REGEX='^v[0-9]+\.[0-9]+\.[0-9]+(-([0-9A-Za-z-]+)(\.[0-9A-Za-z-]+)*)?$'
          if [[ "$VERSION_TAG" =~ $VERSION_TAG_REGEX ]]; then
            PRERELEASE_CHANNEL="${BASH_REMATCH[2]:-}"
          else
            echo "::error::Invalid release tag: $VERSION_TAG"
            exit 1
          fi
          if [[ "$VERSION_TAG" != "v${VERSION}" ]]; then
            echo "::error::Release version and tag do not match: $VERSION / $VERSION_TAG"
            exit 1
          fi
          if [[ "$DOCKER_RAW_TAG" != "latest" && ! "$DOCKER_RAW_TAG" =~ ^[A-Za-z][0-9A-Za-z-]*$ ]]; then
            echo "::error::Invalid Docker raw tag: $DOCKER_RAW_TAG"
            exit 1
          fi
          if [[ -n "$PRERELEASE_CHANNEL" && "$IS_PRERELEASE" != "true" ]]; then
            echo "::error::Prerelease tags must set is_prerelease=true"
            exit 1
          fi
          if [[ -z "$PRERELEASE_CHANNEL" && "$IS_PRERELEASE" == "true" ]]; then
            echo "::error::Stable release tags must set is_prerelease=false"
            exit 1
          fi
          if [[ -n "$PRERELEASE_CHANNEL" && "$DOCKER_RAW_TAG" != "$PRERELEASE_CHANNEL" ]]; then
            echo "::error::Prerelease builds must use docker_raw_tag=$PRERELEASE_CHANNEL"
            exit 1
          fi
          if [[ -z "$PRERELEASE_CHANNEL" && "$DOCKER_RAW_TAG" != "latest" ]]; then
            echo "::error::Stable builds must use docker_raw_tag=latest"
            exit 1
          fi

      - name: Checkout release commit
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.release_sha }}
          persist-credentials: false

      - name: Resolve Docker raw tag
        id: raw-tag
        env:
          IS_PRERELEASE: ${{ inputs.is_prerelease }}
          DOCKER_RAW_TAG: ${{ inputs.docker_raw_tag }}
          MATRIX_RAW_TAG: ${{ matrix.raw_tag }}
        run: |
          set -euo pipefail

          if [[ "$IS_PRERELEASE" == "true" ]]; then
            if [[ "$MATRIX_RAW_TAG" == "latest" ]]; then
              echo "docker_tag=${DOCKER_RAW_TAG}" >> "$GITHUB_OUTPUT"
              echo "publish_raw_tag=true" >> "$GITHUB_OUTPUT"
            else
              echo "docker_tag=${MATRIX_RAW_TAG}" >> "$GITHUB_OUTPUT"
              echo "publish_raw_tag=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "docker_tag=${MATRIX_RAW_TAG}" >> "$GITHUB_OUTPUT"
            echo "publish_raw_tag=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker image
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.raw-tag.outputs.docker_tag }},enable=${{ steps.raw-tag.outputs.publish_raw_tag == 'true' }}
            type=semver,pattern=v{{version}}${{ matrix.suffix }},value=${{ inputs.version_tag }}
            type=semver,pattern=v{{major}}.{{minor}}${{ matrix.suffix }},value=${{ inputs.version_tag }},enable=${{ !inputs.is_prerelease }}
            type=semver,pattern=v{{major}}${{ matrix.suffix }},value=${{ inputs.version_tag }},enable=${{ !inputs.is_prerelease }}

      - name: Read Node.js version
        id: node-version
        run: echo "version=$(cat .node-version)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          build-args: |
            NODE_VERSION=${{ steps.node-version.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.target }}-${{ matrix.platform_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}-${{ matrix.platform_name }}
          platforms: ${{ matrix.platform }}
          provenance: false
          sbom: false

      - name: Export Docker build metadata
        run: |
          set -euo pipefail
          mkdir -p "docker-metadata/${{ matrix.target }}/tags" "docker-metadata/${{ matrix.target }}/digests"
          printf '%s\n' '${{ steps.meta.outputs.tags }}' > "docker-metadata/${{ matrix.target }}/tags/${{ matrix.platform_name }}.txt"
          digest="${{ steps.build.outputs.digest }}"
          touch "docker-metadata/${{ matrix.target }}/digests/${digest#sha256:}"

      - name: Upload Docker metadata
        uses: actions/upload-artifact@v7
        with:
          name: docker-${{ matrix.target }}-${{ matrix.platform_name }}
          path: docker-metadata/${{ matrix.target }}
          if-no-files-found: error
          retention-days: 1

  docker-manifest:
    name: docker manifest (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: docker
    environment: release
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: basic
          - target: extended

    steps:
      - name: Download Docker metadata
        uses: actions/download-artifact@v8
        with:
          pattern: docker-${{ matrix.target }}-*
          path: docker-metadata
          merge-multiple: true

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create multi-platform Docker manifests
        env:
          IMAGE: ghcr.io/${{ github.repository }}
        run: |
          set -euo pipefail

          mapfile -t tags < <(cat docker-metadata/tags/*.txt | sort -u)
          if (( ${#tags[@]} == 0 )); then
            echo "::error::No Docker tags were produced for ${{ matrix.target }}"
            exit 1
          fi

          mapfile -t digests < <(find docker-metadata/digests -maxdepth 1 -type f -print | sort)
          if (( ${#digests[@]} == 0 )); then
            echo "::error::No Docker digests were produced for ${{ matrix.target }}"
            exit 1
          fi

          sources=()
          for digest_file in "${digests[@]}"; do
            digest="$(basename "$digest_file")"
            sources+=("${IMAGE}@sha256:${digest}")
          done

          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=("--tag" "$tag")
          done

          docker buildx imagetools create "${tag_args[@]}" "${sources[@]}"
