name: Release

on:
  workflow_call:
    inputs:
      release_ref:
        description: Branch to publish the npm package from.
        required: true
        type: string
      release_sha:
        description: Exact release commit SHA to publish from.
        required: true
        type: string
      version:
        description: Release version to publish.
        required: true
        type: string
      version_tag:
        description: Release tag name.
        required: true
        type: string
      npm_tag:
        description: npm dist-tag to publish.
        required: true
        type: string
      is_prerelease:
        description: Whether the release is a prerelease.
        required: true
        type: boolean

concurrency:
  group: npm-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HUSKY: 0

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Validate release ref
        env:
          RELEASE_REF: ${{ inputs.release_ref }}
          RELEASE_SHA: ${{ inputs.release_sha }}
          VERSION: ${{ inputs.version }}
          VERSION_TAG: ${{ inputs.version_tag }}
          NPM_TAG: ${{ inputs.npm_tag }}
          IS_PRERELEASE: ${{ inputs.is_prerelease }}
        run: |
          set -euo pipefail
          if [[ "$RELEASE_REF" != "main" && ! "$RELEASE_REF" =~ ^release-[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid release ref: $RELEASE_REF"
            exit 1
          fi
          if [[ ! "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Invalid release SHA: $RELEASE_SHA"
            exit 1
          fi
          VERSION_TAG_REGEX='^v[0-9]+\.[0-9]+\.[0-9]+(-([0-9A-Za-z-]+)(\.[0-9A-Za-z-]+)*)?$'
          if [[ "$VERSION_TAG" =~ $VERSION_TAG_REGEX ]]; then
            PRERELEASE_CHANNEL="${BASH_REMATCH[2]:-}"
          else
            echo "::error::Invalid release tag: $VERSION_TAG"
            exit 1
          fi
          if [[ "$VERSION_TAG" != "v${VERSION}" ]]; then
            echo "::error::Release version and tag do not match: $VERSION / $VERSION_TAG"
            exit 1
          fi
          if [[ "$NPM_TAG" != "latest" && ! "$NPM_TAG" =~ ^[A-Za-z][0-9A-Za-z-]*$ ]]; then
            echo "::error::Invalid npm tag: $NPM_TAG"
            exit 1
          fi
          if [[ "$PRERELEASE_CHANNEL" =~ ^(alpha|beta|rc)([0-9-].*)?$ ]]; then
            EXPECTED_NPM_TAG=next
          elif [[ -n "$PRERELEASE_CHANNEL" ]]; then
            EXPECTED_NPM_TAG="$PRERELEASE_CHANNEL"
          else
            EXPECTED_NPM_TAG=latest
          fi
          if [[ "$NPM_TAG" != "$EXPECTED_NPM_TAG" ]]; then
            echo "::error::Release tags must use npm_tag=$EXPECTED_NPM_TAG"
            exit 1
          fi
          if [[ -z "$PRERELEASE_CHANNEL" && "$NPM_TAG" != "latest" ]]; then
            echo "::error::Stable release tags must use npm_tag=latest"
            exit 1
          fi
          if [[ -n "$PRERELEASE_CHANNEL" && "$IS_PRERELEASE" != "true" ]]; then
            echo "::error::Prerelease tags must set is_prerelease=true"
            exit 1
          fi
          if [[ -z "$PRERELEASE_CHANNEL" && "$IS_PRERELEASE" == "true" ]]; then
            echo "::error::Stable release tags must set is_prerelease=false"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Build
        run: pnpm build

      - name: Publish to npm
        run: pnpm publish --no-git-checks --access public --provenance --tag ${{ inputs.npm_tag }}

      - name: Resolve release changelog range
        id: release-notes-range
        env:
          VERSION_TAG: ${{ inputs.version_tag }}
          RELEASE_SHA: ${{ inputs.release_sha }}
        run: node scripts/resolve-release-notes-range.cjs "$VERSION_TAG" "$RELEASE_SHA"

      - name: Generate release changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff-release.toml
          args: --tag ${{ inputs.version_tag }} --strip header ${{ steps.release-notes-range.outputs.range }}
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Finalize release changelog
        id: release-notes
        env:
          GIT_CLIFF_OUTPUT: ${{ steps.git-cliff.outputs.changelog }}
          VERSION_TAG: ${{ inputs.version_tag }}
          PREVIOUS_TAG: ${{ steps.release-notes-range.outputs.previous_tag }}
          NPM_TAG: ${{ inputs.npm_tag }}
        run: |
          set -euo pipefail

          node scripts/finalize-release-notes.cjs "$GIT_CLIFF_OUTPUT" release-notes.md "$VERSION_TAG" "$PREVIOUS_TAG" "$NPM_TAG"
          echo "path=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version_tag }}
          target_commitish: ${{ inputs.release_sha }}
          name: Release ${{ inputs.version_tag }}
          body_path: ${{ steps.release-notes.outputs.path }}
          files: binaries/*/*
          draft: false
          prerelease: ${{ inputs.is_prerelease }}
          token: ${{ secrets.GITHUB_TOKEN }}
