name: Binaries

on:
  workflow_call:
    inputs:
      release_ref:
        description: Branch to build release binaries from.
        required: false
        type: string
      release_sha:
        description: Exact release commit SHA to build from.
        required: false
        type: string
      version:
        description: Release version being built.
        required: false
        type: string
      version_tag:
        description: Release tag name.
        required: false
        type: string
  workflow_dispatch:

concurrency:
  group: binaries-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HUSKY: 0

jobs:
  binaries:
    runs-on: ${{ matrix.runner || matrix.os }}
    environment: release
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          # Linux builds
          - os: ubuntu-latest
            platform: linux-x64
            script: sea:binary:linux
            artifact: 1mcp-linux-x64
          - os: ubuntu-latest
            platform: linux-arm64
            script: sea:binary:linux:arm64
            artifact: 1mcp-linux-arm64
            runner: ubuntu-24.04-arm
          # Windows builds
          - os: windows-latest
            platform: win32-x64
            script: sea:binary:win
            artifact: 1mcp-win32-x64.exe
          # macOS builds
          - os: macos-15-intel
            platform: darwin-x64
            script: sea:binary:macos:x64
            artifact: 1mcp-darwin-x64
          - os: macos-latest
            platform: darwin-arm64
            script: sea:binary:macos
            artifact: 1mcp-darwin-arm64

    steps:
      - name: Validate release ref
        env:
          RELEASE_REF: ${{ inputs.release_ref || 'main' }}
          RELEASE_SHA: ${{ inputs.release_sha || '' }}
          VERSION: ${{ inputs.version || '' }}
          VERSION_TAG: ${{ inputs.version_tag || '' }}
        run: |
          set -euo pipefail
          if [[ "$RELEASE_REF" != "main" && ! "$RELEASE_REF" =~ ^release-[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid release ref: $RELEASE_REF"
            exit 1
          fi
          if [[ -n "$RELEASE_SHA" && ! "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Invalid release SHA: $RELEASE_SHA"
            exit 1
          fi
          if [[ -n "$VERSION_TAG" && ! "$VERSION_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-beta\.[0-9]+)?$ ]]; then
            echo "::error::Invalid release tag: $VERSION_TAG"
            exit 1
          fi
          if [[ -n "$VERSION" && -n "$VERSION_TAG" && "$VERSION_TAG" != "v${VERSION}" ]]; then
            echo "::error::Release version and tag do not match: $VERSION / $VERSION_TAG"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_sha || format('refs/heads/{0}', inputs.release_ref || 'main') }}

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Build and create SEA binary
        run: |
          pnpm sea:build
          pnpm ${{ matrix.script }}

      - name: Test binary functionality (Unix)
        if: ${{ !startsWith(matrix.platform, 'win32') }}
        run: |
          chmod +x scripts/test-binary-unix.sh
          ./scripts/test-binary-unix.sh ./1mcp ${{ matrix.platform }}
        shell: bash

      - name: Test binary functionality (Windows)
        if: ${{ startsWith(matrix.platform, 'win32') }}
        run: |
          .\scripts\test-binary-windows.ps1 -BinaryPath ".\1mcp.exe" -Platform "${{ matrix.platform }}"
        shell: powershell

      - name: Rename binary for platform-specific archive
        env:
          ARTIFACT_NAME: ${{ matrix.artifact }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          if [[ "$PLATFORM" == win32-* ]]; then
            mv 1mcp.exe "$ARTIFACT_NAME"
          else
            mv 1mcp "$ARTIFACT_NAME"
          fi
        shell: bash

      - name: Create compressed archive
        run: pnpm archive

      - name: Upload compressed archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            *.tar.gz
            *.zip
          retention-days: 1
