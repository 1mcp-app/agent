name: Release Pipeline

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Resolve the branch that this release should publish from. Tags like
  # v0.32.2 may release from a maintenance branch named release-0.32, but only when
  # the tag points at that branch's current tip.
  resolve_release_ref:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_ref: ${{ steps.resolve.outputs.release_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release ref
        id: resolve
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ ! "$TAG_NAME" =~ ^v([0-9]+)\.([0-9]+)(\.[0-9]+)?([-.].*)?$ ]]; then
            echo "::error::Release tags must look like v<major>.<minor>[.<patch>][-pre]."
            exit 1
          fi

          RELEASE_BRANCH="release-${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
          MATCHING_BRANCH_SHA=$(git ls-remote --heads origin "refs/heads/${RELEASE_BRANCH}" | awk '{print $1}')
          TAG_COMMIT=$(git rev-list -n 1 "refs/tags/${TAG_NAME}")

          if [[ -z "$MATCHING_BRANCH_SHA" ]]; then
            git fetch --no-tags origin "+refs/heads/main:refs/remotes/origin/main"
            MAIN_SHA=$(git rev-parse "origin/main")
            if [[ "$TAG_COMMIT" != "$MAIN_SHA" ]]; then
              echo "::error::Tag $TAG_NAME must point at main when no ${RELEASE_BRANCH} branch exists."
              exit 1
            fi

            echo "release_ref=main" >> "$GITHUB_OUTPUT"
            echo "No ${RELEASE_BRANCH} branch found; releasing from main."
            exit 0
          fi

          git fetch --no-tags origin "+refs/heads/${RELEASE_BRANCH}:refs/remotes/origin/${RELEASE_BRANCH}"
          if [[ "$TAG_COMMIT" != "$MATCHING_BRANCH_SHA" ]]; then
            echo "::error::Tag $TAG_NAME must point at the current ${RELEASE_BRANCH} branch tip."
            exit 1
          fi

          echo "release_ref=${RELEASE_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "Releasing from ${RELEASE_BRANCH}."

  # Trigger CI workflow for testing and validation
  ci:
    needs: resolve_release_ref
    uses: ./.github/workflows/test-and-validate.yml
    permissions:
      contents: read

  # Update version in codebase (must run before builds)
  update-version:
    needs: [resolve_release_ref, ci]
    uses: ./.github/workflows/update-version.yml
    with:
      release_ref: ${{ needs.resolve_release_ref.outputs.release_ref }}
    secrets: inherit
    permissions:
      contents: write

  # Build binaries (needs updated version)
  binaries:
    needs: [resolve_release_ref, update-version]
    uses: ./.github/workflows/build-binaries.yml
    with:
      release_ref: ${{ needs.resolve_release_ref.outputs.release_ref }}
    permissions:
      contents: write

  # Publish to npm (needs binaries for release)
  release:
    needs: [resolve_release_ref, update-version, binaries]
    uses: ./.github/workflows/publish-to-npm.yml
    with:
      release_ref: ${{ needs.resolve_release_ref.outputs.release_ref }}
    secrets: inherit
    permissions:
      contents: write
      id-token: write

  # Build and publish Docker images (needs updated version)
  docker:
    needs: [resolve_release_ref, update-version]
    uses: ./.github/workflows/build-docker-images.yml
    with:
      release_ref: ${{ needs.resolve_release_ref.outputs.release_ref }}
    secrets: inherit
    permissions:
      contents: read
      packages: write
      security-events: write
